<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Times Square Media Wall</title>
<style>
  :root {
    --gap: 10px;
    --glow: #00e5ff;
  }








  
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Segoe UI", Helvetica, Arial, sans-serif;
    color: #fff;
  }

  /* faint city backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(255,0,128,.18), transparent 45%),
      radial-gradient(ellipse at 80% 10%, rgba(0,229,255,.18), transparent 45%),
      radial-gradient(ellipse at 50% 100%, rgba(255,200,0,.10), transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    padding: 14px;
  }

  .marquee {
    flex: 0 0 auto;
    text-align: center;
    font-weight: 800;
    letter-spacing: 6px;
    font-size: clamp(14px, 2.4vw, 30px);
    text-transform: uppercase;
    padding: 4px 0 12px;
    color: #fff;
    text-shadow:
      0 0 6px var(--glow),
      0 0 18px var(--glow),
      0 0 36px rgba(0,229,255,.7);
    animation: flicker 5s infinite;
  }
  .marquee span { color: #ff2e88; text-shadow: 0 0 8px #ff2e88, 0 0 24px #ff2e88; }

  @keyframes flicker {
    0%,19%,21%,23%,80%,100% { opacity: 1; }
    20%,22%,82% { opacity: .55; }
  }

  .wall {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: var(--gap);
    min-height: 0;
  }

  .tile {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    background: #0a0a0a;
    border: 2px solid rgba(0,229,255,.35);
    box-shadow:
      0 0 10px rgba(0,229,255,.25),
      inset 0 0 18px rgba(0,0,0,.8);
    transition: box-shadow .4s ease, border-color .4s ease;
  }
  .tile:nth-child(3n+2) { border-color: rgba(255,46,136,.40); box-shadow: 0 0 10px rgba(255,46,136,.25), inset 0 0 18px rgba(0,0,0,.8); }
  .tile:nth-child(3n)   { border-color: rgba(255,200,0,.40);  box-shadow: 0 0 10px rgba(255,200,0,.20),  inset 0 0 18px rgba(0,0,0,.8); }

  .tile .media {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.08);
    transition: opacity .9s ease, transform 6s ease;
  }
  .tile .media.show {
    opacity: 1;
    transform: scale(1);
  }
  .tile .media.leaving {
    opacity: 0;
    transform: scale(1.12);
  }

  /* scanline / billboard texture overlay */
  .tile::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.04) 0px,
      rgba(255,255,255,.04) 1px,
      transparent 2px,
      transparent 4px
    );
    mix-blend-mode: overlay;
    opacity: .35;
  }

  .badge {
    position: absolute;
    top: 6px;
    left: 6px;
    z-index: 3;
    font-size: 9px;
    letter-spacing: 1px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,0,0,.55);
    color: var(--glow);
    text-shadow: 0 0 6px var(--glow);
    opacity: .8;
  }

  .live {
    position: absolute;
    top: 6px;
    right: 6px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #fff;
    background: rgba(0,0,0,.5);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .live i {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff2e88; box-shadow: 0 0 8px #ff2e88;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ---- loading state ---- */
  .tile.loading { border-color: rgba(255,200,0,.85); box-shadow: 0 0 16px rgba(255,200,0,.55), inset 0 0 18px rgba(0,0,0,.8); }

  .loader {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background:
      linear-gradient(110deg, #0c0c0c 8%, #1c1c24 18%, #0c0c0c 33%) ,
      #0a0a0a;
    background-size: 200% 100%;
    animation: shimmer 1.2s linear infinite;
  }
  .tile.loading .loader { display: flex; }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .spinner {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: var(--glow);
    box-shadow: 0 0 10px var(--glow);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader .timer {
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 700;
    color: var(--glow);
    text-shadow: 0 0 6px var(--glow);
  }

  /* badge speed colors */
  .badge.fast { color: #2bff88; text-shadow: 0 0 6px #2bff88; }
  .badge.slow { color: #ffd000; text-shadow: 0 0 6px #ffd000; }
  .badge.fail { color: #ff3b3b; text-shadow: 0 0 6px #ff3b3b; }

  /* ---- faults toggle button ---- */
  .faults-btn {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 30;
    font-family: inherit;
    font-weight: 800;
    letter-spacing: 1px;
    font-size: 12px;
    color: #fff;
    background: rgba(20,0,8,.85);
    border: 1px solid rgba(255,59,59,.7);
    box-shadow: 0 0 12px rgba(255,59,59,.45);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .faults-btn:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(255,59,59,.7); }
  .faults-btn .count {
    display: inline-block;
    min-width: 18px;
    text-align: center;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 10px;
    background: #ff3b3b;
    color: #1a0000;
    font-size: 11px;
  }

  /* ---- side panel ---- */
  .panel {
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    width: min(440px, 92vw);
    z-index: 40;
    background: rgba(8,8,12,.97);
    border-left: 2px solid rgba(255,59,59,.5);
    box-shadow: -10px 0 40px rgba(0,0,0,.7);
    transform: translateX(100%);
    transition: transform .35s ease;
    display: flex;
    flex-direction: column;
  }
  .panel.open { transform: translateX(0); }

  .panel header {
    flex: 0 0 auto;
    padding: 16px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel header h2 {
    margin: 0;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ff5d5d;
    text-shadow: 0 0 8px rgba(255,59,59,.6);
  }
  .panel .tools { display: flex; gap: 8px; }
  .panel .tools button {
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 5px;
    padding: 5px 9px;
    cursor: pointer;
  }
  .panel .tools button:hover { background: rgba(255,255,255,.18); }

  .panel .list {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 12px 24px;
  }
  .panel .empty {
    color: #6b6b78;
    font-size: 13px;
    text-align: center;
    margin-top: 40px;
  }
  .fault-row {
    padding: 9px 10px;
    margin-bottom: 8px;
    background: rgba(255,59,59,.06);
    border: 1px solid rgba(255,59,59,.25);
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.4;
    word-break: break-all;
  }
  .fault-row .meta {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .fault-row .reason { color: #ff7a7a; font-weight: 800; }
  .fault-row .when { color: #888; }
  .fault-row .ms { color: #ffd000; }
  .fault-row a { color: #9fd8ff; text-decoration: none; }
  .fault-row a:hover { text-decoration: underline; }

  /* ---- paused state ---- */
  /* freeze every CSS animation (spinner, shimmer, marquee flicker, live pulse) */
  body.paused .tile *,
  body.paused .marquee,
  body.paused .spinner,
  body.paused .loader { animation-play-state: paused !important; }
</style>
</head>

      </div>
    </header>
    <div class="list" id="faultList">

    </div>
  </aside>

const IMG_EXT = /\.(jpe?g|png|webp|avif|gif|bmp|svg)(\?|$)/i;
const VID_EXT = /\.(mp4|mov|webm|m4v)(\?|$)/i;
(function addChatUrls() {
  const seen = new Set([...IMAGES, ...VIDEOS]);
  for (const u of CHAT_URLS) {
    if (typeof u !== "string" || !/^https?:\/\//i.test(u)) continue; // skip blob:/local paths
    if (seen.has(u)) continue;
    if (IMG_EXT.test(u)) { IMAGES.push(u); seen.add(u); }
    else if (VID_EXT.test(u)) { VIDEOS.push(u); seen.add(u); }
    // pdf/xlsx/doc/ppt/csv/txt/m4a etc. are skipped (not displayable)
  }
})();

/* clean up the one defensive replace hack into a plain string at runtime */
const POOL = [
  ...IMAGES.map(u => ({ type: "image", url: u })),
  ...VIDEOS.map(u => ({ type: "video", url: u }))
];

const TILES = 9;
const wall = document.getElementById("wall");

/* tuning knobs */
const SLOW_MS = 1500;      // load time above this is flagged "slow" (yellow)
const LOAD_TIMEOUT_MS = 20000;  // give up on a media after this and record a timeout fault

const rand = (min, max) => min + Math.random() * (max - min);
const now = () => performance.now();

let paused = false;  // global pause flag (toggled by spacebar)

/* track URLs currently on the wall so swaps don't duplicate */
const onWall = new Set();

function pickItem() {
  // weight toward images a bit so the wall isn't all heavy video
  for (let tries = 0; tries < 40; tries++) {
    const item = Math.random() < 0.45 && VIDEOS.length
      ? { type: "video", url: VIDEOS[Math.floor(Math.random() * VIDEOS.length)] }
      : { type: "image", url: IMAGES[Math.floor(Math.random() * IMAGES.length)] };
    if (!onWall.has(item.url)) return item;
  }
  return POOL[Math.floor(Math.random() * POOL.length)];
}

/* -------- fault tracking + side panel -------- */
const faults = [];            // { url, type, reason, ms, when }
const faultUrls = new Set();  // dedupe
const faultListEl = document.getElementById("faultList");
const faultEmptyEl = document.getElementById("faultEmpty");
const faultCountEl = document.getElementById("faultCount");

function recordFault(url, type, reason, ms) {
  if (faultUrls.has(url)) return;   // only list each bad URL once
  faultUrls.add(url);
  const when = new Date().toLocaleTimeString();
  faults.push({ url, type, reason, ms: Math.round(ms), when });
  renderFaults();
}

function renderFaults() {
  faultCountEl.textContent = faults.length;
  if (!faults.length) {
    faultEmptyEl.style.display = "";
    // remove any existing rows
    faultListEl.querySelectorAll(".fault-row").forEach(n => n.remove());
    return;
  }
  faultEmptyEl.style.display = "none";
  faultListEl.querySelectorAll(".fault-row").forEach(n => n.remove());
  faults.forEach(f => {
    const row = document.createElement("div");
    row.className = "fault-row";
    const msTxt = f.reason === "timeout" ? `&gt;${(LOAD_TIMEOUT_MS/1000)|0}s` : `${f.ms}ms`;
    row.innerHTML =
      `<div class="meta"><span class="reason">${f.reason}</span>` +
      `<span class="when">${f.when}</span>` +
      `<span class="ms">${msTxt}</span>` +
      `<span class="when">${f.type}</span></div>` +
      `<a href="${f.url}" target="_blank" rel="noreferrer">${f.url}</a>`;
    faultListEl.appendChild(row);
  });
}

/* -------- media building with load gating -------- */
function buildMediaEl(item) {
  let el;
  if (item.type === "video") {
    el = document.createElement("video");
    el.muted = true;
    el.loop = true;
    el.autoplay = true;
    el.playsInline = true;
    el.setAttribute("playsinline", "");
    el.preload = "auto";
    el.src = item.url;
  } else {
    el = document.createElement("img");
    el.loading = "eager";
    el.decoding = "async";
    el.src = item.url;
  }
  el.className = "media";
  el.referrerPolicy = "no-referrer";
  return el;
}

/*
 * Resolves when the media is actually ready to display, or rejects on error/timeout.
 * This is what makes a lagging cell "wait" — its next swap isn't scheduled until this settles.
 */
function whenReady(el, item) {
  return new Promise((resolve, reject) => {
    let settled = false;
    const done = (fn) => (arg) => { if (settled) return; settled = true; cleanup(); fn(arg); };

    const onLoad = done(resolve);
    const onError = done(() => reject(new Error("error")));
    const timer = setTimeout(done(() => reject(new Error("timeout"))), LOAD_TIMEOUT_MS);

    function cleanup() {
      clearTimeout(timer);
      if (item.type === "video") {
        el.removeEventListener("loadeddata", onLoad);
        el.removeEventListener("canplay", onLoad);
        el.removeEventListener("error", onError);
      } else {
        el.removeEventListener("load", onLoad);
        el.removeEventListener("error", onError);
      }
    }

    if (item.type === "video") {
      // already buffered? (cache hit)
      if (el.readyState >= 2) return onLoad();
      el.addEventListener("loadeddata", onLoad, { once: true });
      el.addEventListener("canplay", onLoad, { once: true });
      el.addEventListener("error", onError, { once: true });
    } else {
      if (el.complete && el.naturalWidth > 0) return onLoad();
      el.addEventListener("load", onLoad, { once: true });
      el.addEventListener("error", onError, { once: true });
    }
  });
}

function createTile(index) {
  const tile = document.createElement("div");
  tile.className = "tile";

  const badge = document.createElement("div");
  badge.className = "badge";
  tile.appendChild(badge);

  const live = document.createElement("div");
  live.className = "live";
  live.innerHTML = '<i></i>LIVE';
  tile.appendChild(live);

  // loading overlay (shimmer + spinner + live timer)
  const loader = document.createElement("div");
  loader.className = "loader";
  const spinner = document.createElement("div");
  spinner.className = "spinner";
  const timer = document.createElement("div");
  timer.className = "timer";
  timer.textContent = "0.0s";
  loader.appendChild(spinner);
  loader.appendChild(timer);
  tile.appendChild(loader);

  const state = { current: null, currentUrl: null, tick: null, nextDelay: 0, scheduled: false, pendingResume: false };

  function arm(delay) {
    clearTimeout(state.timer);
    state.scheduled = true;
    state.timer = setTimeout(() => { state.scheduled = false; swap(); }, delay);
  }

  // pause-aware scheduler: while paused we remember the delay and re-arm on resume
  function scheduleSwap(delay) {
    state.nextDelay = delay;
    if (paused) { state.pendingResume = true; return; }
    arm(delay);
  }

  tile.__pause = () => {
    // if a swap was waiting on a timer, cancel it and remember to re-arm on resume.
    // (if the cell is mid-load instead, its in-flight load will re-schedule itself.)
    if (state.scheduled) {
      clearTimeout(state.timer);
      state.scheduled = false;
      state.pendingResume = true;
    }
    if (state.tick) { clearInterval(state.tick); state.tick = null; }
    if (state.current && state.current.tagName === "VIDEO") { try { state.current.pause(); } catch (e) {} }
  };
  tile.__resume = () => {
    if (state.current && state.current.tagName === "VIDEO") { try { state.current.play().catch(() => {}); } catch (e) {} }
    if (state.pendingResume) { state.pendingResume = false; arm(state.nextDelay); }
  };

  async function swap() {
    const item = pickItem();
    const next = buildMediaEl(item);
    onWall.add(item.url);
    next.style.zIndex = 2; // sits above the outgoing media but below the loader
    tile.appendChild(next);

    // enter loading state for THIS cell only — it will wait here until ready
    tile.classList.add("loading");
    badge.className = "badge";
    badge.textContent = item.type === "video" ? "LOADING REEL" : "LOADING PHOTO";

    const started = now();
    state.tick = setInterval(() => {
      if (paused) return;
      timer.textContent = ((now() - started) / 1000).toFixed(1) + "s";
    }, 100);

    let ms = 0, ok = false, reason = null;
    try {
      await whenReady(next, item);
      ms = now() - started;
      ok = true;
      if (item.type === "video" && !paused) next.play().catch(() => {});
    } catch (e) {
      ms = now() - started;
      reason = e.message; // "error" or "timeout"
    } finally {
      if (state.tick) { clearInterval(state.tick); state.tick = null; }
      tile.classList.remove("loading");
    }

    if (!ok) {
      // record fault, drop the dead element, and immediately try a different one
      recordFault(item.url, item.type, reason, ms);
      onWall.delete(item.url);
      if (next.parentNode === tile) tile.removeChild(next);
      badge.className = "badge fail";
      badge.textContent = "FAILED";
      // brief pause so the FAILED flash is visible, then retry this cell
      scheduleSwap(600);
      return;
    }

    // success: label with load time + speed color
    const slow = ms > SLOW_MS;
    badge.className = "badge " + (slow ? "slow" : "fast");
    badge.textContent = (item.type === "video" ? "REEL " : "PHOTO ") + (ms / 1000).toFixed(2) + "s";

    // crossfade the freshly-loaded media in
    requestAnimationFrame(() => requestAnimationFrame(() => next.classList.add("show")));

    // retire the previous media
    const old = state.current, oldUrl = state.currentUrl;
    if (old) {
      old.classList.add("leaving");
      old.classList.remove("show");
      setTimeout(() => {
        if (old.tagName === "VIDEO") { try { old.pause(); old.removeAttribute("src"); old.load(); } catch (e) {} }
        if (old.parentNode === tile) tile.removeChild(old);
        if (oldUrl) onWall.delete(oldUrl);
      }, 1000);
    }

    state.current = next;
    state.currentUrl = item.url;

    // this cell keeps randomizing on its own cadence (independent of the slow ones)
    scheduleSwap(rand(3500, 9000));
  }

  wall.appendChild(tile);
  scheduleSwap(index * 350 + rand(0, 600));
  return tile;
}

const tiles = [];
for (let i = 0; i < TILES; i++) tiles.push(createTile(i));

renderFaults();

/* -------- pause / resume (spacebar) -------- */
function setPaused(p) {
  if (p === paused) return;
  paused = p;
  document.body.classList.toggle("paused", paused);
  tiles.forEach(t => (paused ? t.__pause() : t.__resume()));
}

window.addEventListener("keydown", (e) => {
  if (e.code === "Space" || e.key === " " || e.key === "Spacebar") {
    e.preventDefault();          // stop the page from scrolling
    setPaused(!paused);
  }
});

/* keep videos playing if the browser pauses them on tab refocus (unless we're paused) */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && !paused) {
    document.querySelectorAll("video.media").forEach(v => v.play().catch(() => {}));
  }
});
</script>
